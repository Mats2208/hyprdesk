name: Deploy landing

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/deploy-web.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un deploy a la vez. No cancelamos el que está en vuelo: dejar Pages a medio publicar es peor
# que esperar 40 segundos.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci

      # BASE: Pages sirve el sitio desde /hyprdesk/, no desde /. Sin esto, los assets (y el GLB y
      # el decoder Draco, que scene.js pide por BASE_URL) darían 404 solo en producción.
      - name: build
        run: npm run build
        env:
          BASE: /hyprdesk/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
